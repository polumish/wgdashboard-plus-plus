version: "3.8"

services:
  wgdashboard:
    image: ghcr.io/polumish/wgdashboard-plus-plus:latest
    container_name: wgdashboard
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    environment:
      # ── Required ────────────────────────────────
      - WG_DB_TYPE=mysql
      - WG_DB_HOST=mariadb
      - WG_DB_USER=wgdash
      - WG_DB_PASSWORD=changeme_strong_password
      # ── Optional (uncomment to customize) ───────
      # - username=admin
      # - password=your_admin_password
      # - global_dns=1.1.1.1
      # - public_ip=your.server.ip
      # - wgd_port=10086
      # - TZ=Europe/Kyiv
    ports:
      - "10086:10086"
      - "51820:51820/udp"
    volumes:
      - wg_configs:/etc/wireguard
      - wg_data:/data
    depends_on:
      mariadb:
        condition: service_healthy

  mariadb:
    image: mariadb:11
    container_name: wgdashboard-db
    restart: unless-stopped
    environment:
      - MARIADB_ROOT_PASSWORD=changeme_root_password
      - MARIADB_DATABASE=wgdashboard
      - MARIADB_USER=wgdash
      - MARIADB_PASSWORD=changeme_strong_password
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  wg_configs:
  wg_data:
  mariadb_data:
