stages:
  - test
  - deploy
  - mirror
  - upstream-watch
  - docker

test:
  stage: test
  tags:
    - wgdashboard
  variables:
    PYTHONPATH: "$CI_PROJECT_DIR/src"
  before_script:
    - source /opt/WGDashboard/src/venv/bin/activate
    - pip install pytest --quiet 2>/dev/null
  script:
    - cd "$CI_PROJECT_DIR/src"
    - python -m pytest tests/ -v --tb=short
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"

deploy:
  stage: deploy
  tags:
    - wgdashboard
  script:
    - cd /opt/WGDashboard
    - git fetch gitlab
    - git checkout main
    - git merge gitlab/main --ff-only
    - cd src
    - source venv/bin/activate
    - pip install -r requirements.txt --quiet 2>/dev/null
    # Install or update the Path MTU probe (idempotent — reruns are safe).
    # Installs iputils-tracepath/mtr-tiny and enables the hourly systemd timer.
    - |
      if [ -f /opt/WGDashboard/scripts/install-pmtu-probe.sh ]; then
        sudo bash /opt/WGDashboard/scripts/install-pmtu-probe.sh || echo "WARN: PMTU probe install failed; continuing deploy"
      fi
    - ./wgd.sh restart
    - echo "Gunicorn restarted"
    - sleep 5
    - |
      for i in 1 2 3; do
        if curl -sf http://localhost:10086/api/getDashboardTheme > /dev/null 2>&1; then
          echo "Health check passed"
          exit 0
        fi
        echo "Attempt $i: waiting for gunicorn..."
        sleep 3
      done
      echo "Health check failed after 3 attempts!"
      exit 1
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  environment:
    name: production
    url: https://dashboard.net.half.net.ua

mirror-github:
  stage: mirror
  tags:
    - wgdashboard
  variables:
    GIT_STRATEGY: none
  script:
    - cd /opt/WGDashboard
    - git remote remove github 2>/dev/null || true
    - git remote add github "https://x-access-token:${GH_MIRROR_TOKEN}@github.com/polumish/wgdashboard-plus-plus.git"
    - git push github main --force
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  allow_failure: true

upstream-watch:
  stage: upstream-watch
  tags:
    - wgdashboard
  variables:
    GIT_STRATEGY: none
  script:
    - python3 /opt/WGDashboard/scripts/check_upstream.py
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  allow_failure: true

docker-publish:
  stage: docker
  tags:
    - wgdashboard
  script:
    - cd /opt/WGDashboard
    - echo "$GH_MIRROR_TOKEN" | docker login ghcr.io -u polumish --password-stdin
    - IMAGE="ghcr.io/polumish/wgdashboard-plus-plus"
    - VERSION="${CI_COMMIT_TAG#v}"
    - docker build -t "${IMAGE}:${CI_COMMIT_TAG}" -t "${IMAGE}:latest" -f docker/Dockerfile .
    - docker push "${IMAGE}:${CI_COMMIT_TAG}"
    - docker push "${IMAGE}:latest"
    - docker logout ghcr.io
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+/
  allow_failure: true
